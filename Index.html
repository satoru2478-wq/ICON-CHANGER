<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>V CONNECT | ICON VAULT PRO</title>
    
    <meta name="description" content="Private PWA Icon Creation Engine by Vedant. No data collection.">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon.png" type="image/png">
    <link rel="apple-touch-icon" href="icon.png">

    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Orbitron:wght@400;900&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    
    <style>
        :root { --accent: #00f2ff; --glass: rgba(255, 255, 255, 0.03); --bg: #030303; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; scroll-behavior: smooth; overflow-x: hidden; }

        .hero { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; perspective: 1200px; }
        .gyro-container { width: 180px; height: 180px; background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 40px; backdrop-filter: blur(25px); display: flex; align-items: center; justify-content: center; margin-bottom: 40px; transform-style: preserve-3d; transition: transform 0.1s ease-out; }
        .gyro-inner { font-family: 'Orbitron'; font-weight: 900; font-size: 80px; color: var(--accent); transform: translateZ(50px); }

        h1 { font-family: 'Syncopate', sans-serif; text-transform: uppercase; letter-spacing: 12px; font-size: 2.5rem; background: linear-gradient(#fff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .section { padding: 80px 20px; text-align: center; }
        .card { background: var(--glass); backdrop-filter: blur(40px); border: 1px solid rgba(255,255,255,0.1); border-radius: 40px; padding: 40px 20px; max-width: 450px; margin: auto; }

        .btn { background: #fff; color: #000; padding: 15px 30px; border-radius: 50px; font-family: 'Orbitron'; font-weight: 900; border: none; cursor: pointer; margin: 8px; transition: 0.3s; }
        .btn-magic { background: var(--accent); }

        .vault-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 15px; max-width: 800px; margin: 40px auto; padding: 0 20px; }
        .icon-wrapper { position: relative; background: rgba(255,255,255,0.05); border-radius: 20px; padding: 8px; border: 1px solid rgba(255,255,255,0.1); }
        .saved-icon { width: 100%; aspect-ratio: 1/1; border-radius: 15px; object-fit: cover; }
        
        .btn-action { position: absolute; width: 24px; height: 24px; border-radius: 50%; border: none; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 12px; }
        .del-btn { top: -5px; right: -5px; background: #ff3b30; }
        .dl-btn { bottom: -5px; right: -5px; background: #34C759; text-decoration: none; }

        .disclaimer { margin-top: 50px; font-size: 10px; opacity: 0.3; letter-spacing: 1px; }
    </style>
</head>
<body>

    <section class="hero">
        <div class="gyro-container" id="gBox"><div class="gyro-inner">V</div></div>
        <h1>Studio</h1>
        <button class="btn" onclick="document.getElementById('edit').scrollIntoView()" style="background: transparent; border: 1px solid #fff; color: #fff; margin-top: 30px;">OPEN STUDIO</button>
    </section>

    <section class="section" id="edit">
        <div class="card">
            <input type="file" id="up" accept="image/*" hidden>
            <button class="btn" onclick="document.getElementById('up').click()">LOAD IMAGE</button>
            <div id="crop-w" style="margin: 30px 0;"><img id="pv" src=""></div>
            <div id="pnl" style="display:none;">
                <button class="btn btn-magic" onclick="erase()">MAGIC ERASE</button>
                <button class="btn" onclick="save()">SAVE VAULT</button>
            </div>
        </div>
    </section>

    <section class="section">
        <h2 style="font-family: 'Syncopate'; font-size: 1rem;">MY VAULT</h2>
        <div class="vault-container" id="grid"></div>
        <div class="disclaimer">V CONNECT © 2026 | PRIVATE CLIENT-SIDE UTILITY | NO DATA COLLECTED</div>
    </section>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script>
        const gBox = document.getElementById('gBox');
        let tX = 0, tY = 0, cX = 0, cY = 0;
        window.addEventListener('deviceorientation', (e) => { tX = e.gamma/2; tY = (e.beta-45)/2; });
        function anim() { cX+=(tX-cX)*0.1; cY+=(tY-cY)*0.1; gBox.style.transform=`rotateY(${cX}deg) rotateX(${-cY}deg)`; requestAnimationFrame(anim); }
        anim();

        let crp;
        const up = document.getElementById('up');
        const pv = document.getElementById('pv');

        up.onchange = (e) => {
            const r = new FileReader();
            r.onload = () => {
                pv.src = r.result;
                if (crp) crp.destroy();
                crp = new Cropper(pv, { aspectRatio: 1, viewMode: 1 });
                document.getElementById('pnl').style.display = 'block';
            };
            r.readAsDataURL(e.target.files[0]);
        };

        function erase() {
            const cv = crp.getCroppedCanvas();
            const ct = cv.getContext('2d');
            const px = ct.getImageData(0,0,cv.width,cv.height);
            const d = px.data;
            const r=d[0], g=d[1], b=d[2];
            for (let i=0; i<d.length; i+=4) {
                if (Math.abs(d[i]-r)<50 && Math.abs(d[i+1]-g)<50 && Math.abs(d[i+2]-b)<50) d[i+3]=0;
            }
            ct.putImageData(px,0,0);
            pv.src = cv.toDataURL();
            crp.replace(pv.src);
        }

        function save() {
            const img = crp.getCroppedCanvas({width:512, height:512}).toDataURL();
            let v = JSON.parse(localStorage.getItem('vVlt') || '[]');
            v.unshift(img);
            localStorage.setItem('vVlt', JSON.stringify(v));
            draw();
        }

        function del(i) {
            let v = JSON.parse(localStorage.getItem('vVlt') || '[]');
            v.splice(i,1);
            localStorage.setItem('vVlt', JSON.stringify(v));
            draw();
        }

        function draw() {
            const v = JSON.parse(localStorage.getItem('vVlt') || '[]');
            const g = document.getElementById('grid');
            g.innerHTML = v.map((m, i) => `
                <div class="icon-wrapper">
                    <button class="del-btn btn-action" onclick="del(${i})">×</button>
                    <a href="${m}" download="icon.png" class="dl-btn btn-action">↓</a>
                    <img src="${m}" class="saved-icon">
                </div>
            `).join('');
        }
        window.onload = draw;
    </script>
</body>
</html>
